<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    #score {
      color: #fff;
      font-size: 24px;
      margin-bottom: 10px;
    }
    canvas {
      border: 2px solid #4CAF50;
    }
    #message {
      color: #fff;
      font-size: 20px;
      margin-top: 14px;
      min-height: 28px;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message">Press any arrow key to start</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('message');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, gameLoop, running;

    // Track which keys are currently held down
    const keysHeld = new Set();

    function init() {
      snake = [{ x: 10, y: 10 }];
      dir = { x: 0, y: 0 };
      nextDir = { x: 0, y: 0 };
      score = 0;
      running = false;
      scoreEl.textContent = 'Score: 0';
      msgEl.textContent = 'Press any arrow key to start';
      placeFood();
      draw();
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function activateCheatCode() {
      // Add 100 to score
      score += 100;
      scoreEl.textContent = 'Score: ' + score;

      // Grow snake by 100 segments (add to the tail)
      const tail = snake[snake.length - 1];
      for (let i = 0; i < 100; i++) {
        snake.push({ x: tail.x, y: tail.y });
      }

      // Flash message
      msgEl.textContent = '🐍 CHEAT ACTIVATED! +100';
      setTimeout(() => {
        if (running) msgEl.textContent = '';
      }, 2000);
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = 'Score: ' + score;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#111';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.strokeRect(x * GRID, y * GRID, GRID, GRID);
        }
      }

      ctx.fillStyle = '#f44336';
      ctx.beginPath();
      ctx.arc(
        food.x * GRID + GRID / 2,
        food.y * GRID + GRID / 2,
        GRID / 2 - 2, 0, Math.PI * 2
      );
      ctx.fill();

      snake.forEach((seg, i) => {
        if (i === 0) {
          ctx.fillStyle = '#81C784';
          ctx.beginPath();
          ctx.roundRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2, 4);
          ctx.fill();
        } else {
          ctx.fillStyle = '#4CAF50';
          ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
        }
      });
    }

    function endGame() {
      clearInterval(gameLoop);
      running = false;
      msgEl.textContent = 'Game Over! Press any arrow key to restart';
    }

    document.addEventListener('keydown', e => {
      keysHeld.add(e.key);

      // Cheat code: Ctrl + Shift + X all held, then trigger
     if (
        keysHeld.has('Control') &&
        keysHeld.has('Shift') &&
        keysHeld.has('X')
      ) {
        activateCheatCode();
      }

      const moves = {
        ArrowUp:    { x: 0,  y: -1 },
        ArrowDown:  { x: 0,  y:  1 },
        ArrowLeft:  { x: -1, y:  0 },
        ArrowRight: { x: 1,  y:  0 },
      };

      if (!moves[e.key]) return;
      e.preventDefault();

      const m = moves[e.key];
      if (m.x === -dir.x && m.y === -dir.y) return;

      nextDir = m;

      if (!running) {
        running = true;
        msgEl.textContent = '';
        if (nextDir.x === 0 && nextDir.y === 0) return;
        gameLoop = setInterval(step, 120);
      }
    });

    document.addEventListener('keyup', e => {
      keysHeld.delete(e.key);
    });

    init();
  </script>
</body>
</html>
